# Binary Sensor
# ============================================================
binary_sensor:
  - platform: template
    name: "${dpi1c_desk} Moving"
    id: ${desk_id}_moving
    lambda: 'return id(${desk_id}_is_moving);'

# ============================================================
# Buttons
# ============================================================
button:
  # 수동 Up (max raw=6500 → 125cm)
  - platform: template
    name: "${dpi1c_desk} Move Up"
    id: btn_${desk_id}_up
    icon: 'mdi:arrow-up-bold'
    on_press:
      - lambda: |-
          if (!id(${desk_id}_ble_client)->connected() || id(${desk_id}_handle_move) == 0) {
            ESP_LOGW("status", "Not connected"); return;
          }
          uint16_t raw = 6500;
          id(${desk_id}_target_raw) = raw;
          id(${desk_id}_moving_to_target) = true;
          id(${desk_id}_is_moving) = true;
          id(${desk_id}_move_after) = millis();
          uint8_t val[] = {(uint8_t)(raw & 0xFF), (uint8_t)(raw >> 8)};
          esp_ble_gattc_write_char(
            id(${desk_id}_ble_client)->get_gattc_if(), id(${desk_id}_ble_client)->get_conn_id(),
            id(${desk_id}_handle_move), sizeof(val), val,
            ESP_GATT_WRITE_TYPE_NO_RSP, ESP_GATT_AUTH_REQ_NO_MITM);
          ESP_LOGD("moving", "Up (raw=%d)", raw);
      - script.execute: ${desk_id}_move_loop

  # 수동 Down (min raw=0 → 60cm)
  - platform: template
    name: "${dpi1c_desk} Move Down"
    id: btn_${desk_id}_down
    icon: 'mdi:arrow-down-bold'
    on_press:
      - lambda: |-
          if (!id(${desk_id}_ble_client)->connected() || id(${desk_id}_handle_move) == 0) {
            ESP_LOGW("status", "Not connected"); return;
          }
          uint16_t raw = 0;
          id(${desk_id}_target_raw) = raw;
          id(${desk_id}_moving_to_target) = true;
          id(${desk_id}_is_moving) = true;
          id(${desk_id}_move_after) = millis();
          uint8_t val[] = {0x00, 0x00};
          esp_ble_gattc_write_char(
            id(${desk_id}_ble_client)->get_gattc_if(), id(${desk_id}_ble_client)->get_conn_id(),
            id(${desk_id}_handle_move), sizeof(val), val,
            ESP_GATT_WRITE_TYPE_NO_RSP, ESP_GATT_AUTH_REQ_NO_MITM);
          ESP_LOGD("moving", "Down (raw=%d)", raw);
      - script.execute: ${desk_id}_move_loop

  # 정지
  - platform: template
    name: "${dpi1c_desk} Move Stop"
    id: btn_${desk_id}_stop
    icon: 'mdi:stop'
    on_press:
      - lambda: |-
          if (!id(${desk_id}_ble_client)->connected()) {
            ESP_LOGW("moving", "Stop: BLE not connected");
            return;
          }

          // BLE 이동 중인지 먼저 확인 (아래에서 false로 바꾸기 전에)
          bool was_ble_move = id(${desk_id}_moving_to_target);

          id(${desk_id}_moving_to_target) = false;
          id(${desk_id}_is_moving) = false;

          // 공통: FF 00 → ctrl
          if (id(${desk_id}_handle_ctrl) != 0) {
            uint8_t stop[] = {0xFF, 0x00};
            esp_ble_gattc_write_char(
              id(${desk_id}_ble_client)->get_gattc_if(), id(${desk_id}_ble_client)->get_conn_id(),
              id(${desk_id}_handle_ctrl), sizeof(stop), stop,
              ESP_GATT_WRITE_TYPE_NO_RSP, ESP_GATT_AUTH_REQ_NO_MITM);
          }

          if (was_ble_move) {
            // ── BLE 이동 정지: FF 00만 → 원래 동작 ──
            ESP_LOGD("moving", "Stop (BLE): FF 00 → ctrl");
          } else {
            // ── 물리 조작 정지: script로 반복 정지 (move-to-current) ──
            ESP_LOGD("moving", "Stop (Physical): starting physical_stop script");
            id(${desk_id}_physical_stop).execute();
          }
      - delay: 100ms
      - lambda: |-
          // Heartbeat (BLE 정지 시 마무리, physical_stop에도 포함되어 있어 중복 무해)
          if (id(${desk_id}_ble_client)->connected() && id(${desk_id}_handle_move) != 0) {
            uint8_t hb[] = {0x01, 0x80};
            esp_ble_gattc_write_char(
              id(${desk_id}_ble_client)->get_gattc_if(), id(${desk_id}_ble_client)->get_conn_id(),
              id(${desk_id}_handle_move), sizeof(hb), hb,
              ESP_GATT_WRITE_TYPE_NO_RSP, ESP_GATT_AUTH_REQ_NO_MITM);
          }

  # 프리셋 이동 버튼 (1~4)
  - platform: template
    name: "${dpi1c_desk} Preset 1"
    id: btn_${desk_id}_preset_1
    icon: 'mdi:numeric-1-box'
    on_press:
      - script.execute:
          id: ${desk_id}_preset_move
          slot: 0

  - platform: template
    name: "${dpi1c_desk} Preset 2"
    id: btn_${desk_id}_preset_2
    icon: 'mdi:numeric-2-box'
    on_press:
      - script.execute:
          id: ${desk_id}_preset_move
          slot: 1

  - platform: template
    name: "${dpi1c_desk} Preset 3"
    id: btn_${desk_id}_preset_3
    icon: 'mdi:numeric-3-box'
    on_press:
      - script.execute:
          id: ${desk_id}_preset_move
          slot: 2

  - platform: template
    name: "${dpi1c_desk} Preset 4"
    id: btn_${desk_id}_preset_4
    icon: 'mdi:numeric-4-box'
    on_press:
      - script.execute:
          id: ${desk_id}_preset_move
          slot: 3

  # 프리셋 저장 (1~4)
  - platform: template
    name: "${dpi1c_desk} Preset Save 1"
    id: btn_${desk_id}_save_preset_1
    icon: 'mdi:content-save'
    on_press:
      - script.execute:
          id: ${desk_id}_preset_save
          slot: 0

  - platform: template
    name: "${dpi1c_desk} Preset Save 2"
    id: btn_${desk_id}_save_preset_2
    icon: 'mdi:content-save'
    on_press:
      - script.execute:
          id: ${desk_id}_preset_save
          slot: 1

  - platform: template
    name: "${dpi1c_desk} Preset Save 3"
    id: btn_${desk_id}_save_preset_3
    icon: 'mdi:content-save'
    on_press:
      - script.execute:
          id: ${desk_id}_preset_save
          slot: 2

  - platform: template
    name: "${dpi1c_desk} Preset Save 4"
    id: btn_${desk_id}_save_preset_4
    icon: 'mdi:content-save'
    on_press:
      - script.execute:
          id: ${desk_id}_preset_save
          slot: 3

  # 프리셋 삭제 (1~4)
  - platform: template
    name: "${dpi1c_desk} Preset Delete 1"
    id: btn_${desk_id}_del_preset_1
    icon: 'mdi:delete'
    on_press:
      - script.execute:
          id: ${desk_id}_preset_delete
          slot: 0

  - platform: template
    name: "${dpi1c_desk} Preset Delete 2"
    id: btn_${desk_id}_del_preset_2
    icon: 'mdi:delete'
    on_press:
      - script.execute:
          id: ${desk_id}_preset_delete
          slot: 1

  - platform: template
    name: "${dpi1c_desk} Preset Delete 3"
    id: btn_${desk_id}_del_preset_3
    icon: 'mdi:delete'
    on_press:
      - script.execute:
          id: ${desk_id}_preset_delete
          slot: 2

  - platform: template
    name: "${dpi1c_desk} Preset Delete 4"
    id: btn_${desk_id}_del_preset_4
    icon: 'mdi:delete'
    on_press:
      - script.execute:
          id: ${desk_id}_preset_delete
          slot: 3

# ============================================================
# Number Slider (목표 높이)
# ============================================================
number:
  - platform: template
    name: "${dpi1c_desk} Target Height"
    id: ${desk_id}_target_height
    min_value: 60.0
    max_value: 125.0
    step: 0.1
    unit_of_measurement: 'cm'
    icon: 'mdi:human-male-height'
    optimistic: true
    restore_value: true
    set_action:
      - lambda: |-
          if (!id(${desk_id}_ble_client)->connected() || id(${desk_id}_handle_move) == 0) {
            ESP_LOGW("status", "Not connected");
            return;
          }
          float target = x;
          uint16_t raw = (uint16_t)((target - 60.0) * 100.0);

          if (id(${desk_id}_moving_to_target)) {
            id(${desk_id}_moving_to_target) = false;
            uint8_t stop[] = {0xFF, 0x00};
            esp_ble_gattc_write_char(
              id(${desk_id}_ble_client)->get_gattc_if(), id(${desk_id}_ble_client)->get_conn_id(),
              id(${desk_id}_handle_ctrl), sizeof(stop), stop,
              ESP_GATT_WRITE_TYPE_NO_RSP, ESP_GATT_AUTH_REQ_NO_MITM);
            uint8_t hb[] = {0x01, 0x80};
            esp_ble_gattc_write_char(
              id(${desk_id}_ble_client)->get_gattc_if(), id(${desk_id}_ble_client)->get_conn_id(),
              id(${desk_id}_handle_move), sizeof(hb), hb,
              ESP_GATT_WRITE_TYPE_NO_RSP, ESP_GATT_AUTH_REQ_NO_MITM);
            id(${desk_id}_move_after) = millis() + 2000;
            ESP_LOGW("status", "Slider re-operation detected -> stopping, restarting in 2 sec");
          } else {
            id(${desk_id}_move_after) = millis();
          }

          id(${desk_id}_target_raw) = raw;
          id(${desk_id}_moving_to_target) = true;
          id(${desk_id}_is_moving) = true;
          ESP_LOGI("moving", "Target: %.1fcm (raw=%d)", target, raw);
      - script.execute: ${desk_id}_move_loop

# ============================================================
# Switch
# ============================================================
switch:
  - platform: template
    name: "${dpi1c_desk} BLE Connection"
    id: ${desk_id}_ble_switch
    optimistic: true
    restore_mode: RESTORE_DEFAULT_ON
    turn_on_action:
      - lambda: |-
          id(${desk_id}_ble_enabled) = true;
          ESP_LOGI("status", "Attempting BLE connection");
      - ble_client.connect: ${desk_id}_ble_client
    turn_off_action:
      - lambda: |-
          id(${desk_id}_ble_enabled) = false;
          id(${desk_id}_is_moving) = false;
          id(${desk_id}_moving_to_target) = false;
          ESP_LOGI("status", "BLE Disconnected");
      - ble_client.disconnect: ${desk_id}_ble_client

  # 키잠금 (Child Lock)
  - platform: template
    name: "${dpi1c_desk} Key Lock"
    id: ${desk_id}_key_lock
    icon: 'mdi:lock'
    optimistic: true
    restore_mode: DISABLED
    turn_on_action:
      - lambda: |-
          if (!id(${desk_id}_ble_client)->connected() || id(${desk_id}_handle_0011) == 0) {
            ESP_LOGW("status", "Key Lock verification failed");
            id(${desk_id}_key_lock).publish_state(false);
            return;
          }
          uint8_t mode = id(${desk_id}_lock_mode);
          uint8_t tout = id(${desk_id}_lock_timeout);
          if (mode == 0) mode = 0x01;
          if (tout == 0) tout = 0x0A;
          id(${desk_id}_lock_mode) = mode;
          id(${desk_id}_lock_timeout) = tout;
          uint8_t cmd[] = {0x7F, 0x3F, 0x80, 0x00, mode, tout};
          esp_ble_gattc_write_char(
            id(${desk_id}_ble_client)->get_gattc_if(), id(${desk_id}_ble_client)->get_conn_id(),
            id(${desk_id}_handle_0011), sizeof(cmd), cmd,
            ESP_GATT_WRITE_TYPE_NO_RSP, ESP_GATT_AUTH_REQ_NO_MITM);
          ESP_LOGI("status", "Key Lock ON: mode=0x%02X tout=0x%02X", mode, tout);
      - script.execute: ${desk_id}_read_lock_setting
    turn_off_action:
      - lambda: |-
          if (!id(${desk_id}_ble_client)->connected() || id(${desk_id}_handle_0011) == 0) {
            ESP_LOGW("status", "Key Lock verification failed");
            id(${desk_id}_key_lock).publish_state(true);
            return;
          }
          uint8_t cmd[] = {0x7F, 0x3F, 0x80, 0x00, 0x00, 0x00};
          esp_ble_gattc_write_char(
            id(${desk_id}_ble_client)->get_gattc_if(), id(${desk_id}_ble_client)->get_conn_id(),
            id(${desk_id}_handle_0011), sizeof(cmd), cmd,
            ESP_GATT_WRITE_TYPE_NO_RSP, ESP_GATT_AUTH_REQ_NO_MITM);
          ESP_LOGI("status", "Key Lock OFF");
      - script.execute: ${desk_id}_read_lock_setting

# ============================================================
# Select
# ============================================================
select:
  - platform: template
    name: "${dpi1c_desk} Lock Mode"
    id: ${desk_id}_lock_mode_select
    icon: 'mdi:gesture-double-tap'
    optimistic: true
    restore_value: false
    options:
      - "Double tap"
      - "Double tap, second press to drive"
      - "Press connect button, double-tap the DPI, then tilt"
    set_action:
      - lambda: |-
          uint8_t mode = 0x01;
          if (x == "Double tap, second press to drive") mode = 0x01;
          else if (x == "Double tap") mode = 0x02;
          else if (x == "Press connect button, double-tap the DPI, then tilt") mode = 0x04;
          id(${desk_id}_lock_mode) = mode;
          ESP_LOGI("status", "Key Lock mode → 0x%02X", mode);
          if (!id(${desk_id}_setting_enabled)) return;
          if (!id(${desk_id}_ble_client)->connected() || id(${desk_id}_handle_0011) == 0) return;
          uint8_t tout = id(${desk_id}_lock_timeout);
          uint8_t cmd[] = {0x7F, 0x3F, 0x80, 0x00, mode, tout};
          esp_ble_gattc_write_char(
            id(${desk_id}_ble_client)->get_gattc_if(), id(${desk_id}_ble_client)->get_conn_id(),
            id(${desk_id}_handle_0011), sizeof(cmd), cmd,
            ESP_GATT_WRITE_TYPE_NO_RSP, ESP_GATT_AUTH_REQ_NO_MITM);

  - platform: template
    name: "${dpi1c_desk} Lock Timeout"
    id: ${desk_id}_lock_timeout_select
    icon: 'mdi:timer-outline'
    optimistic: true
    restore_value: false
    options:
      - "3s"
      - "6s"
      - "10s"
    initial_option: "10s"
    set_action:
      - lambda: |-
          uint8_t tout = 0x0A;
          if (x == "3s") tout = 0x03;
          else if (x == "6s") tout = 0x06;
          else if (x == "10s") tout = 0x0A;
          id(${desk_id}_lock_timeout) = tout;
          ESP_LOGI("status", "Key Lock timeout → 0x%02X", tout);
          if (!id(${desk_id}_setting_enabled)) return;
          if (!id(${desk_id}_ble_client)->connected() || id(${desk_id}_handle_0011) == 0) return;
          uint8_t mode = id(${desk_id}_lock_mode);
          uint8_t cmd[] = {0x7F, 0x3F, 0x80, 0x00, mode, tout};
          esp_ble_gattc_write_char(
            id(${desk_id}_ble_client)->get_gattc_if(), id(${desk_id}_ble_client)->get_conn_id(),
            id(${desk_id}_handle_0011), sizeof(cmd), cmd,
            ESP_GATT_WRITE_TYPE_NO_RSP, ESP_GATT_AUTH_REQ_NO_MITM);
